# ══════════════════════════════════════════════════════════════════════════════
# Main Reverse Proxy — Nginx Configuration
# Path-based routing: / → frontend, /api → API, /admin → admin
# Only this service is publicly exposed (ports 80/443)
# ══════════════════════════════════════════════════════════════════════════════

# ── Upstream definitions ─────────────────────────────────────────────────────
upstream frontend_upstream {
    server frontend:80;
    keepalive 16;
}

upstream api_upstream {
    server api:3001;
    keepalive 16;
}

upstream admin_upstream {
    server admin:80;
    keepalive 8;
}

# ── Rate limiting zones ──────────────────────────────────────────────────────
# General API rate limit: 30 req/s per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Admin rate limit: 10 req/s per IP (stricter)
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/s;

# Login brute-force protection: 5 req/min per IP
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ── Connection limiting ─────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# ── Map to identify WebSocket upgrade ────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ══════════════════════════════════════════════════════════════════════════════
# HTTP → HTTPS redirect (port 80)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# HTTPS server (port 443)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name mydomain.com;

    # ── SSL Configuration ────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/mydomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mydomain.com/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── General Settings ─────────────────────────────────────────────────────
    client_max_body_size 50m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    send_timeout 60s;

    # Connection limits
    limit_conn conn_per_ip 50;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Proxy Headers (common) ───────────────────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Request-ID $request_id;

    # ══════════════════════════════════════════════════════════════════════════
    # Route: / → Frontend (Public)
    # ══════════════════════════════════════════════════════════════════════════
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Cache control for HTML
        location ~* \.html$ {
            proxy_pass http://frontend_upstream;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Route: /api → Production API Server
    # ══════════════════════════════════════════════════════════════════════════
    location /api {
        limit_req zone=api_limit burst=50 nodelay;

        # Path rewriting: /api/xxx → /api/xxx (pass through as-is)
        # The API server already handles /api prefix internally
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;

        # WebSocket support (for agent streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Request buffering optimization
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Extended timeouts for AI generation endpoints
        location /api/generate {
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /api/v2/agents/stream {
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
        }

        # Stripe webhook — no rate limiting, needs raw body
        location /api/stripe/webhook {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Content-Type "application/json";
            proxy_request_buffering off;
        }

        # File upload endpoints — larger body, longer timeout
        location ~ ^/api/(extract-pdf|extract-office|generate) {
            client_max_body_size 50m;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Route: /admin → Admin Frontend + Admin API
    # ══════════════════════════════════════════════════════════════════════════

    # Admin API routes — /api/admin/* goes to the API server
    location /api/admin {
        limit_req zone=admin_limit burst=20 nodelay;

        # Brute-force protection on admin auth
        location /api/admin/auth {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
        }

        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Admin frontend — /admin/* serves the admin SPA
    location /admin {
        limit_req zone=admin_limit burst=20 nodelay;

        # Add noindex header for admin
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # Rewrite: /admin/xxx → /xxx for the admin container
        # The admin SPA handles its own client-side routing
        rewrite ^/admin(/.*)$ $1 break;

        proxy_pass http://admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SPA fallback — if the path doesn't match a file, serve index.html
        error_page 404 = /index.html;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Health check endpoint (for load balancers / monitoring)
    # ══════════════════════════════════════════════════════════════════════════
    location /health {
        access_log off;
        return 200 '{"status":"ok","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Block common attack paths
    # ══════════════════════════════════════════════════════════════════════════
    location ~* /\.(git|env|htaccess|htpasswd|svn) {
        deny all;
        return 404;
    }

    location ~* (wp-admin|wp-login|phpmyadmin|administrator) {
        deny all;
        return 404;
    }

    # Deny access to backup/config files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist|old|orig|save)$ {
        deny all;
        return 404;
    }
}
