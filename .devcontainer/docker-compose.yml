version: "3.8"

services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:24-bookworm
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    network_mode: service:db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ankigen
      POSTGRES_PASSWORD: ankigen
      POSTGRES_DB: ankigen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ankigen -d ankigen"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
