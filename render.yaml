# ══════════════════════════════════════════════════════════════════════════════
# Render Blueprint — Unified Docker Container
#
# Services:
#   1. ankigen-api  → mydomain.com/       (Docker, unified API + frontend)
#
# Database is hosted on Neon (free tier).
#
# Deploy with: New → Blueprint → Connect repo
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── Service 1: Unified API + Frontend (mydomain.com/) ──────────────────────
  - type: web
    name: ankigen-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    region: oregon
    plan: free
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: STATIC_DIR
        value: /app/public
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OLLAMA_CLOUD_API_KEY
        sync: false
      - key: OLLAMA_CLOUD_BASE_URL
        sync: false
      - key: AI_TEXT_MODEL
        value: openai/gpt-oss-120b
      - key: AI_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: AI_QBANK_MODEL
        value: openai/gpt-oss-120b
      - key: AI_MINDMAP_MODEL
        value: openai/gpt-oss-120b
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: ADMIN_URL
        sync: false
