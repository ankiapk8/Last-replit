services:
  - type: web
    name: anki-generator
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: STATIC_DIR
        value: /app/public
      - key: DATABASE_URL
        fromDatabase:
          name: anki-generator-db
          property: connectionString
      # qwen3-coder:latest (primary AI provider)
      - key: OLLAMA_CLOUD_API_KEY
        sync: false
      - key: OLLAMA_CLOUD_BASE_URL
        value: https://ollama.com/v1
      # OpenRouter (fallback backend)
      - key: OPENROUTER_API_KEY
        sync: false
      # Per-feature model selection
      - key: AI_TEXT_MODEL
        value: qwen3-coder:30b
      - key: AI_VISION_MODEL
        value: qwen3-vl:235b
      - key: AI_QBANK_MODEL
        value: gpt-oss:120b
      - key: AI_MINDMAP_MODEL
        value: gpt-oss:120b
      # OpenAI-compatible base URL for image generation client
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        value: https://ollama.com/v1

databases:
  - name: anki-generator-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []
